name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run knip
      - run: npm run validate
      - run: npm run build:db
      - run: npm run cache:media
      - run: npm run check:media
      - run: npm test
      - run: npm run build
      - run: npm run check:static
