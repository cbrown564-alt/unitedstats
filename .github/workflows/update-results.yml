name: Update results

on:
  schedule:
    # After the usual match windows: Sun/Mon (weekend games), Thu (midweek).
    - cron: "0 6 * * 0,1,4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Fetch latest results
        id: fetch
        run: |
          npm run update | tee update.log
          n=$(grep -oP 'NEW_MATCHES=\K\d+' update.log || echo 0)
          echo "new=$n" >> "$GITHUB_OUTPUT"

      - name: Enrich current season (scorers, attendance, cups) and positions
        if: steps.fetch.outputs.new != '0'
        run: |
          npm run ingest:wikipedia -- current --reparse || echo "enrichment unavailable, results still committed"
          curl -sL -o data/raw/england.csv https://raw.githubusercontent.com/jalapic/engsoccerdata/master/data-raw/england.csv
          npm run ingest:positions || echo "positions skipped"

      - name: Validate and rebuild database
        if: steps.fetch.outputs.new != '0'
        run: |
          npm run validate
          npm run build:db
          npm run export:dataset
          npm run generate:history-digests -- --latest ${{ steps.fetch.outputs.new }}

      - name: Commit and push
        if: steps.fetch.outputs.new != '0'
        run: |
          git config user.name "unitedstats-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/canonical data/history-digests public/dataset
          git commit -m "data: ${{ steps.fetch.outputs.new }} new result(s) through $(date -u +%F)"
          git push

      - name: Upload database and revalidate changed paths
        if: steps.fetch.outputs.new != '0'
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          UNITEDSTATS_SITE_URL: ${{ secrets.UNITEDSTATS_SITE_URL }}
        run: |
          if [ -z "$BLOB_READ_WRITE_TOKEN" ] || [ -z "$REVALIDATE_SECRET" ] || [ -z "$UNITEDSTATS_SITE_URL" ]; then
            echo "Skipping blob upload + revalidate (secrets not configured — Vercel will full-deploy instead)"
            exit 0
          fi
          npm run upload:db | tee upload.log
          blob_url=$(grep -oP 'UNITEDSTATS_DB_BLOB_URL=\K.*' upload.log)
          # Fail fast if the blob we just wrote isn't a reachable SQLite file —
          # otherwise prod silently serves stale, deploy-time data via the fallback.
          node scripts/check-blob.mjs --url "$blob_url"
          ids=$(grep -oP 'NEW_MATCH_IDS=\K.*' update.log)
          npm run revalidate -- --site "$UNITEDSTATS_SITE_URL" --ids "$ids"
          # Informational: confirm the live site can read the DB after revalidation.
          node scripts/smoke-check.mjs --site "$UNITEDSTATS_SITE_URL" || echo "smoke-check non-fatal failure (site may be protected); inspect manually"
